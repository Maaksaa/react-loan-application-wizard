server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets — Vite outputs them with content hashes,
  # so they're safe to cache for a year.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: any unknown path falls through to index.html
  # so React Router can handle client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Don't cache the entry point — otherwise users get stuck on old bundles
  # after a deploy.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;
}